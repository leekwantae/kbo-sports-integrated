name: KBO 통합 경기정보 자동 갱신

on:
  workflow_dispatch:
  schedule:
    - cron: "17 */4 * * *"
  push:
    branches: ["main"]

permissions:
  contents: write

concurrency:
  group: kbo-integrated-update
  cancel-in-progress: true

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: 저장소 받기
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 티켓링크 데이터 갱신
        run: python update.py

      - name: NOL 데이터 갱신
        run: python extract_games.py

      - name: 변경된 데이터 저장
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data.js games.json
          if git diff --cached --quiet; then
            echo "변경 사항 없음"
          else
            git commit -m "자동 경기정보 갱신"
            git push
          fi

